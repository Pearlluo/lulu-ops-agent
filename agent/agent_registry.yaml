    business_questions: ["What is in the FDS list assets?"]
    allowed_fields: [Title, PID, Active, AssetID, Status, SerialNumber, Model, AssetGroup, AssetGroupPID, ResponsiblePerson, ResponsiblePersonPID, Location, LocationPID, AssetGroup_x003a__x0020_TagsPID, AssetGroup_x003a__x0020_Tags, id, Modified, Created, AuthorLookupId, EditorLookupId, Parent, ParentPID, Sibling, SiblingPID]
    restricted_fields: {}
  fds_clients:

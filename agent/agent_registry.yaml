    description: "FDS client list mirror (75 rows; SharePoint FDS site list)."
    grain: id
    business_questions: ["What is in the FDS list clients?"]
    allowed_fields: [Title, PID, Active, ClientShortName, ATitle, id, Modified, Created, AuthorLookupId, EditorLookupId]
    restricted_fields: {}
  fds_dailysheets:
    domain: FDS (Form Distribution)
    description: "Daily sheet form submissions (schema + data payload per shift date) (18 rows; SharePoint FDS site list)."
    grain: id
    business_questions: ["What is in the FDS list dailysheets?"]
    allowed_fields: [Title, Schema, Data, JobsPIDs, Closed, NumType, Description, AppId, id, Modified, Created, AuthorLookupId, EditorLookupId, ShiftDate, Images]
    restricted_fields: {}
  fds_formdistribute:
    domain: FDS (Form Distribution)
    description: "Form distribution rules — which app/form goes to which users/ops sections (27 rows; SharePoint FDS site list)."
    grain: id
    business_questions: ["What is in the FDS list formdistribute?"]
    allowed_fields: [Title, AppId, SubListNum, PID, Access, IncludeUsers, ExcludeUsers, ExcludeUsersPID, OpsSections, id, Modified, Created, AuthorLookupId, EditorLookupId, AccessPID, IncludeUsersPID, OpsSectionsPID]
    restricted_fields: {}
  fds_jobs:

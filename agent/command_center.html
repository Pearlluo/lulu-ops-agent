<style>

  .sep{color:#3c5074}

var W,H,cx,cy,Rax,Ray,Lx,Ly,DPR=Math.min(window.devicePixelRatio||1,2),U=1;

function resize(){W=window.innerWidth;H=window.innerHeight;U=Math.min(W,H)/760;cx=W*0.42;cy=H*0.46;Rax=W*0.155;Ray=H*0.205;Lx=W*0.135;Ly=H*0.17;cv.width=W*DPR;cv.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);layout();}
window.addEventListener('resize',resize);
function shade(rgb,f){f=1+f;return [Math.max(0,Math.min(255,rgb[0]*f))|0,Math.max(0,Math.min(255,rgb[1]*f))|0,Math.max(0,Math.min(255,rgb[2]*f))|0];}
function rr(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
function hexPath(x,y,r,rot){ctx.beginPath();for(var i=0;i<6;i++){var a=(rot||0)+i*Math.PI/3,px=x+r*Math.cos(a),py=y+r*Math.sin(a);if(i===0)ctx.moveTo(px,py);else ctx.lineTo(px,py);}ctx.closePath();}

function layout(){
  POS={lulu:{x:cx,y:cy}};
  AGENTS.forEach(function(a){
    var ar=a.deg*Math.PI/180,ax=cx+Rax*Math.cos(ar),ay=cy+Ray*Math.sin(ar);
    POS[a.key]={x:ax,y:ay};
    var n=a.systems.length,span=(n>1?54:0);
    a.systems.forEach(function(s,i){
      var off=(n>1?(i/(n-1)-0.5)*span:0),dir=(a.deg+off)*Math.PI/180;   // fan around the agent's outward ray
      POS[s]={x:ax+Lx*Math.cos(dir),y:ay+Ly*Math.sin(dir)};            // X spread by width, Y by height -> fills wide screens
    });
  });
}

var stack=[],HITS=[],last=null,tAcc=0,hoverKey=null,lastHover='_',REV={};   // REV[agentKey]=0..1 branch reveal amount
function bez(p,t){var m=1-t;return{x:m*m*m*p[0]+3*m*m*t*p[2]+3*m*t*t*p[4]+t*t*t*p[6],y:m*m*m*p[1]+3*m*m*t*p[3]+3*m*t*t*p[5]+t*t*t*p[7]};}
function edge(a,b){var mx=(a.x+b.x)/2;return[a.x,a.y,mx,a.y,mx,b.y,b.x,b.y];}
function drawEdge(A,B,hot,i,t){var p=edge(A,B);
  ctx.beginPath();ctx.moveTo(p[0],p[1]);ctx.bezierCurveTo(p[2],p[3],p[4],p[5],p[6],p[7]);
  ctx.strokeStyle=hot?'rgba(84,214,255,.5)':'rgba(70,130,190,.15)';ctx.lineWidth=hot?1.6:1;ctx.stroke();
  var n=hot?3:2;ctx.globalCompositeOperation='lighter';for(var k=0;k<n;k++){var tt=((t*0.16+i*0.13+k/n)%1),q=bez(p,tt);ctx.fillStyle='rgba('+(hot?'150,235,255':'90,190,240')+','+(hot?.95:.5)+')';ctx.beginPath();ctx.arc(q.x,q.y,hot?2.3:1.6,0,7);ctx.fill();}ctx.globalCompositeOperation='source-over';}

function txt(s,x,y,font,col,glow){ctx.font=font;ctx.textAlign='center';ctx.textBaseline='middle';if(glow){ctx.shadowColor=glow;ctx.shadowBlur=8;}ctx.fillStyle=col;ctx.fillText(s,x,y);ctx.shadowBlur=0;}
function statusRing(x,y,r,st){var c=STATC[st];if(st==='healthy')return;ctx.beginPath();ctx.arc(x,y,r,0,7);ctx.strokeStyle='rgba('+c.join(',')+',.9)';ctx.lineWidth=2;ctx.stroke();}
function brackets(x,y,r,rgb){var d=r*1.5,k=r*0.4;ctx.strokeStyle='rgba('+rgb.join(',')+',.9)';ctx.lineWidth=1.4;[[-1,-1],[1,-1],[-1,1],[1,1]].forEach(function(s){ctx.beginPath();ctx.moveTo(x+s[0]*d,y+s[1]*d-s[1]*k);ctx.lineTo(x+s[0]*d,y+s[1]*d);ctx.lineTo(x+s[0]*d-s[0]*k,y+s[1]*d);ctx.stroke();});}

function drawCore(t){var x=cx,y=cy,r=46*U;
  ctx.globalCompositeOperation='lighter';var g=ctx.createRadialGradient(x,y,r*0.3,x,y,r*2.6);g.addColorStop(0,'rgba(242,193,78,.32)');g.addColorStop(.5,'rgba(242,160,60,.1)');g.addColorStop(1,'rgba(242,160,60,0)');ctx.fillStyle=g;ctx.beginPath();ctx.arc(x,y,r*2.6,0,7);ctx.fill();ctx.globalCompositeOperation='source-over';
  ctx.save();ctx.strokeStyle='rgba(242,193,78,.28)';ctx.setLineDash([3,7]);ctx.beginPath();ctx.arc(x,y,r*1.5,t*0.3,t*0.3+6.283);ctx.stroke();ctx.setLineDash([]);ctx.restore();
  hexPath(x,y,r,Math.PI/6);var gg=ctx.createLinearGradient(x,y-r,x,y+r);gg.addColorStop(0,'rgba(60,50,20,.45)');gg.addColorStop(1,'rgba(30,26,12,.25)');ctx.fillStyle=gg;ctx.fill();ctx.strokeStyle='rgba(242,193,78,.85)';ctx.lineWidth=1.6;ctx.stroke();
  hexPath(x,y,r*0.6,Math.PI/6-t*0.5);ctx.strokeStyle='rgba(255,224,150,.5)';ctx.lineWidth=1;ctx.stroke();
  txt('LULUAGENT',x,y-6*U,'700 '+(12*U)+'px ui-monospace,monospace','#fff4dc','rgba(242,193,78,.7)');
  txt('ARCH · ORCHESTRATOR',x,y+9*U,(7.5*U)+'px ui-monospace,monospace','#d8b878');
  HITS.push({key:'lulu',x:x,y:y,r:r*1.2});}

function drawAgent(a,t){var P=POS[a.key],x=P.x,y=P.y,r=27*U,hov=hoverKey===a.key,st=agentStatus(a),rgb=C.agent;
  ctx.globalCompositeOperation='lighter';var g=ctx.createRadialGradient(x,y,r*0.3,x,y,r*(hov?2.6:2.0));g.addColorStop(0,'rgba('+rgb.join(',')+','+(hov?.4:.26)+')');g.addColorStop(1,'rgba('+rgb.join(',')+',0)');ctx.fillStyle=g;ctx.beginPath();ctx.arc(x,y,r*(hov?2.6:2.0),0,7);ctx.fill();ctx.globalCompositeOperation='source-over';
  hexPath(x,y,r,Math.PI/6);var gg=ctx.createLinearGradient(x,y-r,x,y+r);gg.addColorStop(0,'rgba(30,55,80,.5)');gg.addColorStop(1,'rgba(15,30,48,.3)');ctx.fillStyle=gg;ctx.fill();ctx.strokeStyle='rgba('+rgb.join(',')+','+(hov?1:.75)+')';ctx.lineWidth=hov?1.8:1.3;ctx.stroke();
  statusRing(x,y,r*1.18,st);if(hov)brackets(x,y,r,rgb);
  txt(a.short,x,y-2*U,'700 '+(9*U)+'px ui-monospace,monospace','#eaf6ff','rgba(150,224,255,.6)');
  txt('AGENT',x,y+11*U,(7*U)+'px ui-monospace,monospace','#9fc4e6');
  HITS.push({key:a.key,x:x,y:y,r:r*1.25,agent:true});}

function drawSys(k,t){var s=SYS[k],P=POS[k],x=P.x,y=P.y,hov=hoverKey===k,rgb=C[TCOL[s.type]]||C.cyan;
  if(s.shape==='hex'){var r=18*U;
    ctx.globalCompositeOperation='lighter';if(hov){var g=ctx.createRadialGradient(x,y,0,x,y,r*2.2);g.addColorStop(0,'rgba('+rgb.join(',')+',.3)');g.addColorStop(1,'rgba('+rgb.join(',')+',0)');ctx.fillStyle=g;ctx.beginPath();ctx.arc(x,y,r*2.2,0,7);ctx.fill();}ctx.globalCompositeOperation='source-over';
    hexPath(x,y,r,0.52);var gg=ctx.createLinearGradient(x,y-r,x,y+r);gg.addColorStop(0,'rgba('+shade(rgb,-.2).join(',')+',.2)');gg.addColorStop(1,'rgba('+shade(rgb,-.6).join(',')+',.08)');ctx.fillStyle=gg;ctx.fill();ctx.strokeStyle='rgba('+rgb.join(',')+','+(hov?.95:.6)+')';ctx.lineWidth=hov?1.6:1.1;ctx.stroke();
    statusRing(x,y,r*1.25,s.status);txt(s.label,x,y+r+11*U,(8.5*U)+'px ui-monospace,monospace','#cfe0f5');HITS.push({key:k,x:x,y:y,r:r*1.4});return;}
  var w=Math.max(70*U,Math.min(116*U,(s.label.length*7+30)*U)),h=30*U;
  if(hov){ctx.globalCompositeOperation='lighter';var g2=ctx.createRadialGradient(x,y,0,x,y,w*0.85);g2.addColorStop(0,'rgba('+rgb.join(',')+',.28)');g2.addColorStop(1,'rgba('+rgb.join(',')+',0)');ctx.fillStyle=g2;ctx.beginPath();ctx.arc(x,y,w*0.85,0,7);ctx.fill();ctx.globalCompositeOperation='source-over';}
  rr(x-w/2,y-h/2,w,h,7);var g=ctx.createLinearGradient(x,y-h/2,x,y+h/2);g.addColorStop(0,'rgba('+shade(rgb,-.3).join(',')+',.22)');g.addColorStop(1,'rgba('+shade(rgb,-.6).join(',')+',.1)');ctx.fillStyle=g;ctx.fill();ctx.strokeStyle='rgba('+rgb.join(',')+','+(hov?.95:.55)+')';ctx.lineWidth=hov?1.6:1.1;ctx.stroke();
  if(s.shape==='store'){ctx.beginPath();ctx.moveTo(x-w/2+5,y-h/2-3*U);ctx.lineTo(x+w/2-5,y-h/2-3*U);ctx.strokeStyle='rgba('+rgb.join(',')+','+(hov?.8:.4)+')';ctx.lineWidth=1;ctx.stroke();}
  var sc=STATC[s.status];if(s.status!=='healthy'){ctx.fillStyle='rgb('+sc.join(',')+')';ctx.beginPath();ctx.arc(x+w/2-7*U,y-h/2+7*U,2.6*U,0,7);ctx.shadowColor='rgb('+sc.join(',')+')';ctx.shadowBlur=6;ctx.fill();ctx.shadowBlur=0;}
  txt(s.label.toUpperCase(),x,y,'700 '+(10*U)+'px ui-monospace,monospace','#eaf4ff');
  txt(s.metric+' · '+s.sync,x,y+h/2+9*U,(8*U)+'px ui-monospace,monospace','#6f87a6');
  HITS.push({key:k,x:x,y:y,r:Math.max(w,h)/2+6});}

function frame(ts){if(last==null)last=ts;tAcc+=(ts-last)/1000;last=ts;var t=tAcc;
  ctx.clearRect(0,0,W,H);
  // grid
  ctx.strokeStyle='rgba(40,70,110,.05)';ctx.lineWidth=1;for(var gx=(W%46)/2;gx<W;gx+=46){ctx.beginPath();ctx.moveTo(gx,42);ctx.lineTo(gx,H);ctx.stroke();}for(var gy=42+(H%46)/2;gy<H;gy+=46){ctx.beginPath();ctx.moveTo(0,gy);ctx.lineTo(W,gy);ctx.stroke();}
  // a drilled list hides the galaxy ONLY when there's a link-health card to show in its place;
  // with no link-health data the card is empty, so keep the galaxy drawing (never a black void).
  var top=stack[stack.length-1];if(top&&top.kind==='list'&&LINKHEALTH[top.key]&&('broken' in LINKHEALTH[top.key])){requestAnimationFrame(frame);return;}
  HITS=[];
  // intro reveal: open shows only core+agents, then all branches fan out (staggered) and STAY visible
  AGENTS.forEach(function(a,i){
    var shown=t>(0.5+i*0.16);            // 0.5s pause, then each branch eases in ~0.16s after the previous
    if(REV[a.key]==null)REV[a.key]=0;REV[a.key]+=((shown?1:0)-REV[a.key])*0.16;});
  // edges: core->agent always; agent->system fades with the branch's reveal amount
  var ei=0;
  AGENTS.forEach(function(a){var hotA=hoverKey===a.key;drawEdge(POS.lulu,POS[a.key],hotA,ei++,t);
    if(REV[a.key]>0.02){ctx.globalAlpha=REV[a.key];
      a.systems.forEach(function(s){drawEdge(POS[a.key],POS[s],hotA||hoverKey===s,ei++,t);});
      ctx.globalAlpha=1;}});
  // nodes — system leaves only render (and only become hittable) while their branch is revealed
  AGENTS.forEach(function(a){if(REV[a.key]>0.05){ctx.globalAlpha=REV[a.key];a.systems.forEach(function(s){drawSys(s,t);});ctx.globalAlpha=1;}});
  AGENTS.forEach(function(a){drawAgent(a,t);});
  drawCore(t);
  requestAnimationFrame(frame);}

function hitTest(mx,my){for(var i=HITS.length-1;i>=0;i--){var b=HITS[i];if((mx-b.x)*(mx-b.x)+(my-b.y)*(my-b.y)<b.r*b.r)return b;}return null;}
cv.addEventListener('mousemove',function(e){var b=hitTest(e.clientX,e.clientY),k=b?b.key:null;hoverKey=k;cv.style.cursor=b?'pointer':'crosshair';if(k!==lastHover){lastHover=k;renderPanel();}});
cv.addEventListener('mouseleave',function(){hoverKey=null;if(lastHover!==null){lastHover=null;renderPanel();}});
cv.addEventListener('click',function(e){var b=hitTest(e.clientX,e.clientY);if(!b)return;
  if(SYS[b.key]||AGENTS.filter(function(a){return a.key===b.key;})[0])openNode(b.key);});

function renderCrumbs(){var c=document.getElementById('crumbs');var h='<span class="crumb'+(stack.length?'':' last')+'" data-i="-1">COMMAND MATRIX</span>';stack.forEach(function(s,i){h+='<span class="sep">›</span><span class="crumb'+(i===stack.length-1?' last':'')+'" data-i="'+i+'">'+(s.label||s.key).toUpperCase()+'</span>';});c.innerHTML=h;c.querySelectorAll('.crumb').forEach(function(el){el.onclick=function(){var i=+el.getAttribute('data-i');stack=stack.slice(0,i+1);renderPanel();};});}
function badge(st){var c=STATC[st],t={healthy:'HEALTHY',warning:'WARNING',critical:'CRITICAL',offline:'NO ACCESS'}[st];return '<span class="badge" style="color:rgb('+c.join(',')+');border-color:rgba('+c.join(',')+',.5);background:rgba('+c.join(',')+',.08)">● '+t+'</span>';}
function agentLabelOf(ak){var a=AGENTS.filter(function(x){return x.key===ak;})[0];return a?a.en:ak;}
function openNode(key){if(SYS[key]){var ow=SYS2AGENT[key]||'';stack=[{kind:'node',key:ow,label:agentLabelOf(ow)},{kind:'node',key:key,label:SYS[key].label}];}else{stack=[{kind:'node',key:key,label:agentLabelOf(key)}];}renderPanel();}
function openEntity(ek){var e=ENTITIES[ek];if(!e)return;var s=e.parent_system;stack=[{kind:'node',key:e.agent,label:agentLabelOf(e.agent)},{kind:'node',key:s,label:(SYS[s]?SYS[s].label:s)},{kind:'entity',key:ek,label:e.label}];renderPanel();}
function openIssue(id){var i=issueById(id);if(!i)return;var p=[];if(i.agent)p.push({kind:'node',key:i.agent,label:agentLabelOf(i.agent)});if(i.node&&SYS[i.node])p.push({kind:'node',key:i.node,label:SYS[i.node].label});if(i.entity&&ENTITIES[i.entity])p.push({kind:'entity',key:i.entity,label:ENTITIES[i.entity].label});p.push({kind:'issue',key:i.id,label:'Issue: '+i.title});stack=p;renderPanel();}

function renderContent(top){

  // click-drill: BMS -> modules -> lists -> schema ; OPMS -> objects -> schema
  if(top&&top.kind==='bms'){var gr=SCHEMA.bms.groups;PAN.innerHTML='<div class="ph">BMS · '+Object.keys(gr).length+' MODULES</div>'+issueListHTML(issuesForNode(top.key))+nodeMetaHTML(top.key)+'<div class="grp">MODULES</div>'+Object.keys(gr).sort().map(function(m){return '<div class="prow" data-k="'+m+'" style="border-left-color:rgb(84,214,255)"><span class="pn">'+m+'</span><span class="pv">'+gr[m].length+' lists</span></div>';}).join('');PAN.querySelectorAll('.prow').forEach(function(el){el.onclick=function(){stack.push({kind:'mod',key:el.getAttribute('data-k'),label:el.getAttribute('data-k')});renderPanel();};});return;}
  if(top&&top.kind==='mod'){PAN.innerHTML='<div class="ph">'+top.key+' · LISTS</div>'+SCHEMA.bms.groups[top.key].map(function(l){return '<div class="prow" data-k="'+l.n+'" style="border-left-color:rgb(84,214,255)"><span class="pn">'+l.n+'</span><span class="pv">'+l.rows+' rows · '+l.nc+'c</span></div>';}).join('');PAN.querySelectorAll('.prow').forEach(function(el){el.onclick=function(){stack.push({kind:'list',key:el.getAttribute('data-k'),src:'bms',label:el.getAttribute('data-k')});renderPanel();};});return;}
  if(top&&top.kind==='opms'){PAN.innerHTML='<div class="ph">OPMS · '+SCHEMA.opms.objects.length+' OBJECTS</div>'+issueListHTML(issuesForNode(top.key))+nodeMetaHTML(top.key)+'<div class="grp">OBJECTS · SCHEMA</div>'+SCHEMA.opms.objects.map(function(o){return '<div class="prow" data-k="'+o.n+'" style="border-left-color:rgb(84,214,255)"><span class="pn">'+o.n+'</span><span class="pv">'+o.rows+' rows</span></div>';}).join('');PAN.querySelectorAll('.prow').forEach(function(el){el.onclick=function(){stack.push({kind:'list',key:el.getAttribute('data-k'),src:'opms',label:el.getAttribute('data-k')});renderPanel();};});return;}
  // pinned system / ims card
  if(top&&(top.kind==='sys'||top.kind==='ims')){var ps=SYS[top.key];if(ps){var tn0={data:'Data Source',store:'Data Platform',auto:'Automation'}[ps.type];PAN.innerHTML='<div class="ph">'+tn0+'</div><div class="ctitle">'+ps.label+'</div>'+badge(ps.status)+'<div class="kv"><span class="k">METRIC</span><span class="v">'+ps.metric+'</span></div><div class="kv"><span class="k">SYNC</span><span class="v">'+ps.sync+'</span></div><div class="kv"><span class="k">USED BY</span><span class="v">'+ps.used+'</span></div>'+(ps.alert?'<div class="alertbox">⚠ '+ps.alert+'</div>':'')+issueListHTML(issuesForNode(top.key))+nodeMetaHTML(top.key);return;}}
  // pinned agent card
  if(top&&top.kind==='agent'){var ap=AGENTS.filter(function(a){return a.key===top.key;})[0];if(ap){var st2=agentStatus(ap);PAN.innerHTML='<div class="ph">SPECIALIST AGENT</div><div class="ctitle">'+ap.en+'</div>'+badge(st2)+'<div class="kv"><span class="k">TOOLS</span><span class="v">'+ap.tools+'</span></div><div class="kv"><span class="k">DOMAIN</span><span class="v" style="font-size:10px">'+ap.domain+'</span></div><div class="kv"><span class="k">SYSTEMS</span><span class="v">'+ap.systems.length+'</span></div><div class="desc">'+ap.note+'</div>'+agentDetailHTML(top.key)+issueListHTML(issuesForNode(top.key))+nodeMetaHTML(top.key)+'<div class="grp">MANAGES</div>'+ap.systems.map(function(s){var c=STATC[SYS[s].status];return '<div class="prow" data-k="'+s+'" style="border-left-color:rgb('+(C[TCOL[SYS[s].type]]||C.cyan).join(',')+')"><span class="sdot" style="background:rgb('+c.join(',')+');color:rgb('+c.join(',')+')"></span><span class="pn">'+SYS[s].label+'</span><span class="pv">'+SYS[s].metric+'</span></div>';}).join('');PAN.querySelectorAll('.prow').forEach(function(el){var kk=el.getAttribute('data-k');el.onclick=function(){var k2=SYS[kk].kind;stack.push(k2?{kind:k2,key:kk,label:SYS[kk].label}:{kind:'sys',key:kk,label:SYS[kk].label});renderPanel();};});return;}}
  // hover an AGENT
  var ag=AGENTS.filter(function(a){return a.key===hoverKey;})[0];
  if(ag){var st=agentStatus(ag);PAN.innerHTML='<div class="ph">SPECIALIST AGENT</div><div class="ctitle">'+ag.en+'</div>'+badge(st)+
    '<div class="kv"><span class="k">TOOLS</span><span class="v">'+ag.tools+'</span></div><div class="kv"><span class="k">DOMAIN</span><span class="v" style="font-size:10px">'+ag.domain+'</span></div><div class="kv"><span class="k">SYSTEMS</span><span class="v">'+ag.systems.length+'</span></div>'+
    '<div class="desc">'+ag.note+'</div><div class="grp">MANAGES</div>'+ag.systems.map(function(s){var c=STATC[SYS[s].status];return '<div class="prow" style="border-left-color:rgb('+(C[TCOL[SYS[s].type]]||C.cyan).join(',')+')"><span class="sdot" style="background:rgb('+c.join(',')+');color:rgb('+c.join(',')+')"></span><span class="pn">'+SYS[s].label+'</span><span class="pv">'+SYS[s].metric+'</span></div>';}).join('');return;}
  // hover a SYSTEM
  if(hoverKey&&SYS[hoverKey]){var s=SYS[hoverKey];var tn={data:'Data Source',store:'Data Platform',auto:'Automation'}[s.type];PAN.innerHTML='<div class="ph">'+tn+' · under '+AGENTS.filter(function(a){return a.key===SYS2AGENT[hoverKey];})[0].en+'</div><div class="ctitle">'+s.label+'</div>'+badge(s.status)+
    '<div class="kv"><span class="k">METRIC</span><span class="v">'+s.metric+'</span></div><div class="kv"><span class="k">SYNC</span><span class="v">'+s.sync+'</span></div><div class="kv"><span class="k">USED BY</span><span class="v">'+s.used+'</span></div>'+(s.alert?'<div class="alertbox">⚠ '+s.alert+'</div>':'')+(s.kind?'<div class="desc">▸ click to explore '+(s.kind==='bms'?'101 lists & schema':s.kind==='opms'?'28 objects & schema':'contents')+'</div>':'');return;}
  // default: SYSTEM DATA grouped by AGENT
  var html='<div class="ph">COMMAND STRUCTURE</div>';
  AGENTS.forEach(function(a){var nhA=NODEHEALTH[a.key];var c=nhA?sevColor(nhA.severity):STATC[agentStatus(a)];html+='<div class="grp"><span class="sdot" style="background:rgb('+c.join(',')+');color:rgb('+c.join(',')+')"></span>'+a.en+(nhA?' · '+nhA.count+' issue'+(nhA.count>1?'s':''):'')+'</div>';
    a.systems.forEach(function(s){var nhS=NODEHEALTH[s];var sc=nhS?sevColor(nhS.severity):STATC[SYS[s].status];html+='<div class="prow" data-k="'+s+'" style="border-left-color:rgb('+(C[TCOL[SYS[s].type]]||C.cyan).join(',')+')"><span class="sdot" style="background:rgb('+sc.join(',')+');color:rgb('+sc.join(',')+')"></span><span class="pn">'+SYS[s].label+'</span><span class="pv">'+SYS[s].metric+(nhS?' · '+nhS.count+'⚠':'')+'</span></div>';});});
  PAN.innerHTML=html;PAN.querySelectorAll('.prow').forEach(function(el){var k=el.getAttribute('data-k');el.onmouseenter=function(){hoverKey=k;lastHover=k;renderPanel();};el.onclick=function(){if(SYS[k]&&SYS[k].kind){stack.push({kind:SYS[k].kind,key:k,label:SYS[k].label});renderPanel();}};});}

resize();renderPanel();requestAnimationFrame(frame);
</script>
